<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>
<form method="post">
<label for="name">Name:</label>
	<input type="text" required id="name" placeholder="Name">

<label for="email">Email::</label>
	<input type="email" required id="email" placeholder="Email">

<label>Gender:</label>
	<label for="male">
	<input type="radio"  value="gender_m" name="gender" id="male">MALE
	</label>

	
	<label for="female">
	<input type="radio"  value="gender_f" name="gender" id="female">FEMALE
	</label>

<label for="cars">Car Brands:</label>
	<select required id="cars" name="cars">
		<option value="" disabled selected hidden>--Please choose an option--</option>
		 <option value="bmw">BMW</option>
  <option value="audi">Audi</option>
  <option value="tesla">Tesla</option>
	</select>

		
<label for="age">Age:</label>
	<input type="number" required id="age" placeholder="Age">

<label for="dob">DOB:</label>
	<input type="date" required id="dob">

	<label for="tel">Phone Number</label>
	<input type="tel" id="tel" placeholder="xxx-xxx-xxxx">

	<label for="password">Password</label>
	<input type="password" required id="password" placeholder="password">
	<input type="checkbox" required id="tos">
	<label for="tos">I agree to the TOS</label>
	<button type="submit">Submit</button>
	
	

</form>

</body>

</html>
