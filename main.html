<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>
<form>
<label for="name">Name:</label>
	<input type="text" required id="name" placeholder="Name">

<label for="email">Email::</label>
	<input type="email" required id="emil" placeholder="Email">

<label>Gender:</label>
	<input type="radio" required id="gender_m">
	<label for="gender_m">male</label>

	<input type="radio" required id="gender_f">
	<label for="gender_f">female</label>

<label for="cars">Car Brands:</label>
	<select required id="cars" name="cars">
		<option value="" disabled selected hidden>--Please choose an option--</option>
		 <option value="bmw">BMW</option>
  <option value="audi">Audi</option>
  <option value="tesla">Tesla</option>
	</select>

		
<label for="age">Age:</label>
	<input type="number" required id="age" placeholder="Age">

<label for="dob">DOB:</label>
	<input type="date" required id="dob">
	

</form>

</body>

</html>
